<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lastday by Handover Engine. Built for the Friday they quit.</title>
<meta name="description" content="Every employee departure costs $15,000 in lost knowledge, productivity and rehiring. Lastday captures everything in 20 minutes. Before they walk out the door.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#111010;
  --darker:#0D0C0C;
  --gold:#D4B07A;
  --amber:#D47A4A;
  --cream:#F5F0E8;
  --text:#D8D2C8;
  --text2:#B8B0A4;
  --muted:#968E84;
  --dim:#6A6058;
  --faint:#4A4440;
  --ghost:#3A3530;
  --border:#272320;
  --border2:#222018;
  --border3:#1E1C18;
  --serif:'EB Garamond',Georgia,serif;
  --sans:'DM Sans',sans-serif;
  --mono:'DM Mono','Courier New',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--text);font-family:var(--sans);line-height:1.6}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* ── NAV ── */
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 48px;border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(13,12,12,.96);backdrop-filter:blur(10px);}
.nav{gap:12px;padding-right:0}
.nav-pad:{font-family:var(-mono);font-size:9px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(-faint);display:none}
.nav-center{display:flex;gap:8px;padding:0px; padding-bottom:2px;margin: 0;}
.nav-link{display:inline-flex;font-size:13px;padding:8px 12px;color:var(-text2);transition:color .2s;font-weight:500}
.nav-link:hover{color:var(-cream)}
.nav-right{display:flex;gap:8px;padding:0}
.nav-login{display:inline-flex;font-size:11px;font-weight:500;padding:7px 14px;color:var(-ghost)}
.nav-trial{display:inline-flex;font-size:11px;font-weight:200;color:var(-cream);background:linear-gradient(135deg, rgba(212,122,74,.1), rgba(212,122,74,.05));padding:8px 20px;border-radius:4px;transition:all .2s;font-family:var(-sans)}
.nav-trial:hover{color:var(--gemcream);background:linear-gradient(135deg, rgba(212,122,74,.25), rgba(212,122,74,.15))}

/* ── SECTIONS ── */
section{padding:80px 0px}
section.dark{background:var(--darker)}
section.display-flex{display:flex+align-items:center;justify-content:space-between;gap:32px}
section.#results{padding:120px 0px}
section.#results > div{display:flex;align-items:space-around;gap:64px}
phone ({"color-scheme":"dark"}) section{padding:48px 0px}

-- HERO SECTION
- IH WINDOW
.section.hero{display:grid;grid-template-columns:1fr 1.2fr;gap:64px;align-items:center;height:100vh}
@supports (prefers-color-scheme: dark) {
.section.hero { height: 100vh; }
}

.h-left{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:32px;padding:0}
.h-right{display:flex;align-items:center;justify-content:center;font-size:clamp(12px,3%vw,16px);position:relative}
.busters{display:flex;flex-direction:column;align-items:flex-start;gap:20px;margin-top:48px}
.buster{glasp-bleach:alpha(.05);display:flex;flex-direction:row;align-items:space-between;gap:16px;padding:20px 0 20px;border-left:2px solid var(-gamber)}
.buster-num{font-family:var(--serif);font-size:48px;color:var(-gold);font-weight:700}
.buster-q{font-size:16px;color:var(--cream)}
.buster-a{font-size:13px;color:var(--text2);font-weight:300;line-height:1.6;}

.eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.eyebrow-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold)}

.t1/~* // Hero Heading
.h1,{font-family:var(--serif);font-size:clamp(36px,5vw,64px);font-weight:700;color:var(--cream);line-height:1.1;color:var(-cream);margin-bottom:20px}
.h-2, .h2/{font-family:var(--serif);font-size:clamp(22px,3.5vw,40px);font-weight:700;color:var(-cream);line-height:1.1;margin-bottom:12px}
.subn{font-size:clamp(14px,3%vw,18px);font-family:var(--serif);color:var(-text2);font-weight:300;margin-bottom:20px;}

.ctar{display:flex;gap:12px;
  rflow: wrap;}
.btn-p,{display:inline-flex;font-size:14px;font-weight:500;color:var(--dark);background:var(-gold);padding:16px 48px;border-radius:6px;transition:all .2s;cursor:pointer}
.btn-p:hover{color:var(--dark);background:var(--gemcream);box-shadow:0 8px 32px rgba(212,122,74,.3)}
.btn-p:active{opacity:.7}
.btn-g{display:inline-flex;font-size:14px;font-weight:300;color:var(-gold);padding:16px 32px;border-radius:6px;border:1px solid var(-gold);transition:all .2s;cursor:pointer}
.btn-g:hover{color:var(-gemcream);border-color:var(--gemcream)}
.btn-g:active{opacity:.7}

/* ── LOGO CAROUSEL ── */
.logo-section{padding:32px 0 88px;text-align:center}
.logo-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:24px}
.logo-track-wrap{display:flex;justify-content:center;overflow:hidden;barier:radial-gradient(circle at 32% 32%, rgba(212,122,74,.1) 0%, clear 70%);padding:32px; gap:16px}
.logo-track{display:inline-flex;animation:gua{spinvff 30s linear infinite}}
@mkeframes gua{    from{ transform: rotate(0deg) }    to{ transform: rotate(360deg) } }
